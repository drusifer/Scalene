defaults:
  sensitive_by_default: true
  untrusted_by_default: true
  mode: mask

allowlist:
  - tool: Read
    jsonpath: "$.file_path"
    pattern: ".*/(tests|docs|demo)/.*"
    target: "file:///home/drusifer/Projects/Scalene/tests"
    description: "This repo's own test fixtures and docs are dev content, not real sensitive data"
  - tool: Write
    jsonpath: "$.file_path"
    pattern: ".*/(tests|docs|demo)/.*"
    target: "https://localhost"
    description: "Local edits to this repo's own test/doc files, not exfiltration to an external destination"
  - tool: Edit
    jsonpath: "$.file_path"
    pattern: ".*/(tests|docs|demo)/.*"
    target: "https://localhost"
    description: "Local edits to this repo's own test/doc files, not exfiltration to an external destination"
